name: 每日更新重庆气象数据

on:
  schedule:
    # 北京时间每天 07:30 / 12:30 / 17:30（UTC 前一天23:30 / 当天04:30 / 09:30）
    - cron: '30 23 * * *'
    - cron: '30 4 * * *'
    - cron: '30 9 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 抓取官方数据并生成 data.json
        run: python update_data.py
      - name: 提交更新
        run: |
          git config user.name "cq-weather-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "数据更新 $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
